name: Deploy

on:
  workflow_run:
    workflows: ['Release']
    types: [completed]
  workflow_dispatch:
    inputs:
      update_manifest:
        description: >-
          Also refresh update.json on the lobby. Requires dispatching this
          workflow on a v* tag ref whose release has macOS + Windows zips.
        type: boolean
        default: false

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    # Cascade only when upstream Release was a successful v* tag push.
    # Manual dispatch always runs.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15
    steps:
      - name: Resolve deploy context
        id: ctx
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_REF: ${{ github.ref }}
          DISPATCH_SHA: ${{ github.sha }}
          DISPATCH_MANIFEST: ${{ inputs.update_manifest }}
          WF_RUN_TAG: ${{ github.event.workflow_run.head_branch }}
          WF_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "workflow_run" ]]; then
            # Cascade from Release: head_branch is the pushed tag (e.g. v1.2.3).
            echo "tag=$WF_RUN_TAG"             >> "$GITHUB_OUTPUT"
            echo "checkout_ref=$WF_RUN_SHA"    >> "$GITHUB_OUTPUT"
            echo "update_manifest=true"        >> "$GITHUB_OUTPUT"
          else
            # Manual dispatch: honor the ref the user selected in the UI.
            TAG=""
            if [[ "$DISPATCH_REF" =~ ^refs/tags/(.+)$ ]]; then
              TAG="${BASH_REMATCH[1]}"
            fi
            if [[ "$DISPATCH_MANIFEST" == "true" && -z "$TAG" ]]; then
              echo "update_manifest=true requires dispatching on a v* tag ref" >&2
              exit 1
            fi
            echo "tag=$TAG"                              >> "$GITHUB_OUTPUT"
            echo "checkout_ref=$DISPATCH_SHA"            >> "$GITHUB_OUTPUT"
            echo "update_manifest=$DISPATCH_MANIFEST"    >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ctx.outputs.checkout_ref }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: server/go.sum

      - name: Install C++ build deps
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: cmake build-essential libsdl2-dev libsdl2-mixer-dev zlib1g-dev libcurl4-openssl-dev libminizip-dev
          version: 1.0

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ runner.os }}-${{ github.job }}
          max-size: 500M

      - name: Build lobby server
        working-directory: server
        run: go build -trimpath -ldflags '-s -w' -o zsilencer-lobby .

      - name: Build dedicated server (C++ / ARM64)
        env:
          LOBBY_HOST: ${{ vars.LOBBY_HOST }}
        run: |
          mkdir -p build && cd build
          cmake \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DZSILENCER_LOBBY_HOST="${LOBBY_HOST:-silencer.hventura.com}" ..
          make -j"$(nproc)"

      - name: Build update.json from release artifacts
        if: steps.ctx.outputs.update_manifest == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ctx.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p manifest-staging
          cd manifest-staging
          gh release download "$TAG" \
            -R "${{ github.repository }}" \
            -p "zsilencer-macos-arm64.zip" \
            -p "zsilencer-windows-x64.zip"

          MAC_SHA=$(shasum -a 256 zsilencer-macos-arm64.zip | awk '{print $1}')
          WIN_SHA=$(shasum -a 256 zsilencer-windows-x64.zip | awk '{print $1}')

          BASE="https://github.com/${{ github.repository }}/releases/download/${TAG}"
          cat > update.json <<EOF
          {
            "version":        "${TAG#v}",
            "macos_url":      "${BASE}/zsilencer-macos-arm64.zip",
            "macos_sha256":   "${MAC_SHA}",
            "windows_url":    "${BASE}/zsilencer-windows-x64.zip",
            "windows_sha256": "${WIN_SHA}"
          }
          EOF
          cat update.json
          rm zsilencer-macos-arm64.zip zsilencer-windows-x64.zip

      - name: Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up \
            --authkey='${{ secrets.TS_AUTHKEY }}' \
            --hostname=gh-runner-${{ github.run_id }} \
            --advertise-tags=tag:server

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy
          chmod 600 ~/.ssh/deploy

      - name: Deploy
        env:
          HOST: ${{ vars.DEPLOY_HOST }}
          SHA: ${{ steps.ctx.outputs.checkout_ref }}
          UPDATE_MANIFEST: ${{ steps.ctx.outputs.update_manifest }}
        run: |
          set -euo pipefail
          SHORT=${SHA:0:8}
          STAGING=/tmp/zsilencer-$SHORT
          RELEASE=/opt/zsilencer/releases/$SHORT
          SSH_OPTS="-i ~/.ssh/deploy -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts"
          SSH="ssh $SSH_OPTS ubuntu@$HOST"
          SCP="scp $SSH_OPTS"

          $SSH "mkdir -p $STAGING"
          $SCP server/zsilencer-lobby ubuntu@$HOST:$STAGING/
          $SCP build/zsilencer        ubuntu@$HOST:$STAGING/
          $SCP -r data                ubuntu@$HOST:$STAGING/

          if [[ "$UPDATE_MANIFEST" == "true" ]]; then
            $SCP manifest-staging/update.json ubuntu@$HOST:$STAGING/update.json
          fi

          # Atomic swap: move manifest into place, flip symlink, restart —
          # all in one SSH session so clients never see a new lobby version
          # without a matching update.json.
          $SSH "
            set -e
            sudo mkdir -p /opt/zsilencer/releases
            sudo rm -rf $RELEASE
            sudo mv $STAGING $RELEASE
            sudo chmod +x $RELEASE/zsilencer-lobby $RELEASE/zsilencer
            if [ -f $RELEASE/update.json ]; then
              sudo mv $RELEASE/update.json /opt/zsilencer/update.json
            fi
            sudo ln -sfn $RELEASE /opt/zsilencer/current
            sudo ln -sfn /opt/zsilencer/current/data /usr/local/share/zsilencer
            sudo systemctl restart zsilencer-lobby
            sleep 2
            sudo systemctl is-active zsilencer-lobby
          "

      - name: Prune old releases (keep last 3)
        env:
          HOST: ${{ vars.DEPLOY_HOST }}
        run: |
          ssh -i ~/.ssh/deploy ubuntu@$HOST "
            cd /opt/zsilencer/releases
            ls -1t | tail -n +4 | xargs -r sudo rm -rf
          "
