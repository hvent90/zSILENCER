name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install deps (Homebrew)
        run: brew install sdl2 sdl2_mixer

      - name: Configure
        env:
          LOBBY_HOST: ${{ vars.LOBBY_HOST }}
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DZSILENCER_LOBBY_HOST="${LOBBY_HOST:-silencer.hventura.com}"

      - name: Build
        run: cmake --build build --config Release -j"$(sysctl -n hw.ncpu)"

      - name: Ad-hoc codesign
        working-directory: build
        run: |
          codesign --force --deep --sign - zsilencer.app
          codesign --verify --deep --strict --verbose=2 zsilencer.app

      - name: Package .app
        working-directory: build
        run: |
          ditto -ck --sequesterRsrc --keepParent zsilencer.app zsilencer-macos-arm64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: build/zsilencer-macos-arm64.zip
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_INSTALLATION_ROOT }}/installed
            ${{ env.VCPKG_INSTALLATION_ROOT }}/packages
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}

      - name: Configure
        shell: pwsh
        env:
          LOBBY_HOST: ${{ vars.LOBBY_HOST }}
        run: |
          $lobby = if ($env:LOBBY_HOST) { $env:LOBBY_HOST } else { "silencer.hventura.com" }
          cmake -B build -S . `
            -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DZSILENCER_LOBBY_HOST="$lobby"

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        shell: pwsh
        run: |
          $stage = "build/package/zsilencer"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item build/Release/zsilencer.exe $stage/
          Copy-Item build/Release/*.dll $stage/ -ErrorAction SilentlyContinue
          Copy-Item -Recurse data $stage/
          Compress-Archive -Path "build/package/zsilencer" -DestinationPath build/zsilencer-windows-x64.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: build/zsilencer-windows-x64.zip
          if-no-files-found: error

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute release metadata
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT
            echo "name=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "name=Latest master (${GITHUB_SHA::8})" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            artifacts/macos-arm64/*
            artifacts/windows-x64/*
          body: |
            ## Downloads

            - **macOS (Apple Silicon):** `zsilencer-macos-arm64.zip`
            - **Windows (x64):** `zsilencer-windows-x64.zip`

            ## First-run warnings

            These builds aren't code-signed, so your OS will warn you the first time you run them. They're safe — you just need to tell the OS to trust them.

            ### macOS
            If you see *"zsilencer.app is damaged and can't be opened"*:

            - **Easy way:** right-click the app → **Open** → click **Open** in the dialog. Only needed the first time.
            - **From Terminal:** `xattr -cr /path/to/zsilencer.app`

            ### Windows
            If SmartScreen shows *"Windows protected your PC"*:

            - Click **More info** → **Run anyway**.
