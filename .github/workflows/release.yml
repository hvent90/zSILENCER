name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install deps (Homebrew)
        run: brew install sdl2 sdl2_mixer minizip dylibbundler

      - name: Configure
        env:
          LOBBY_HOST: ${{ vars.LOBBY_HOST }}
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DZSILENCER_LOBBY_HOST="${LOBBY_HOST:-silencer.hventura.com}"

      - name: Build
        run: cmake --build build --config Release -j"$(sysctl -n hw.ncpu)"

      - name: Bundle dylibs
        working-directory: build
        run: |
          mkdir -p zsilencer.app/Contents/Frameworks
          dylibbundler \
            --overwrite-dir \
            --bundle-deps \
            --create-dir \
            --fix-file zsilencer.app/Contents/MacOS/zsilencer \
            --dest-dir zsilencer.app/Contents/Frameworks/ \
            --install-path @rpath/
          install_name_tool -add_rpath @executable_path/../Frameworks \
            zsilencer.app/Contents/MacOS/zsilencer 2>/dev/null || true
          echo "--- bundled dylibs ---"
          ls zsilencer.app/Contents/Frameworks/
          echo "--- main binary linkage ---"
          otool -L zsilencer.app/Contents/MacOS/zsilencer

      - name: Import Developer ID cert
        env:
          CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CERT_P12_PASSWORD: ${{ secrets.APPLE_CERT_P12_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"
          echo "$CERT_P12_BASE64" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import /tmp/cert.p12 -P "$CERT_P12_PASSWORD" \
            -A -t cert -f pkcs12 -k build.keychain
          security list-keychains -d user -s build.keychain \
            $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm /tmp/cert.p12
          security find-identity -v -p codesigning build.keychain

      - name: Codesign with Developer ID
        working-directory: build
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          IDENTITY="Developer ID Application"
          # Sign inside-out: dylibs first, then main binary, then bundle.
          # --options runtime (Hardened Runtime) + --timestamp are required
          # by notarytool.
          find zsilencer.app/Contents/Frameworks -name "*.dylib" -print0 \
            | xargs -0 -n1 codesign --force --timestamp --options runtime \
              --sign "$IDENTITY"
          codesign --force --timestamp --options runtime \
            --sign "$IDENTITY" zsilencer.app/Contents/MacOS/zsilencer
          codesign --force --timestamp --options runtime \
            --sign "$IDENTITY" zsilencer.app
          codesign --verify --deep --strict --verbose=2 zsilencer.app

      - name: Notarize and staple
        working-directory: build
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -ck --keepParent zsilencer.app /tmp/notarize.zip
          xcrun notarytool submit /tmp/notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          rm /tmp/notarize.zip
          xcrun stapler staple zsilencer.app
          xcrun stapler validate zsilencer.app
          spctl -a -vv -t execute zsilencer.app

      - name: Package .app
        working-directory: build
        run: |
          ditto -ck --sequesterRsrc --keepParent zsilencer.app zsilencer-macos-arm64.zip

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain build.keychain || true

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: build/zsilencer-macos-arm64.zip
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Export GitHub Actions cache variables for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Configure
        shell: pwsh
        env:
          LOBBY_HOST: ${{ vars.LOBBY_HOST }}
          VCPKG_BINARY_SOURCES: clear;x-gha,readwrite
        run: |
          $lobby = if ($env:LOBBY_HOST) { $env:LOBBY_HOST } else { "silencer.hventura.com" }
          cmake -B build -S . `
            -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DZSILENCER_LOBBY_HOST="$lobby"

      - name: Build
        run: cmake --build build --config Release -- -maxcpucount

      - name: Package
        shell: pwsh
        run: |
          $stage = "build/package/zsilencer"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item build/Release/zsilencer.exe $stage/
          # SDL2 / SDL2_mixer / zlib + transitive audio codec DLLs live in
          # the vcpkg manifest-mode install dir. Bulk-copy them so the zip
          # is self-contained — without these, zsilencer.exe fails to start
          # with a missing SDL2.dll error on machines without vcpkg.
          $vcpkgBin = "build/vcpkg_installed/x64-windows/bin"
          Copy-Item "$vcpkgBin/*.dll" $stage/
          Copy-Item -Recurse data $stage/
          Write-Host "--- packaged files ---"
          Get-ChildItem $stage
          Compress-Archive -Path "build/package/zsilencer" -DestinationPath build/zsilencer-windows-x64.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: build/zsilencer-windows-x64.zip
          if-no-files-found: error

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute release metadata
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT
            echo "name=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "name=Latest master (${GITHUB_SHA::8})" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            artifacts/macos-arm64/*
            artifacts/windows-x64/*
          body: |
            ## Downloads

            - **macOS (Apple Silicon):** `zsilencer-macos-arm64.zip`
            - **Windows (x64):** `zsilencer-windows-x64.zip`

            ## First-run warnings

            ### Windows
            The Windows build isn't code-signed. If SmartScreen shows *"Windows protected your PC"*, click **More info** → **Run anyway**.
